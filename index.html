<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator Using Operators & Functions</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Calculator</h1>

    <div class="calculator">

        <label for="num1">First Number</label>
        <input type="number" id="num1" placeholder="Enter First Number">

        <label for="num2">Second Number</label>
        <input type="number" id="num2" placeholder="Enter Second Number">

        <div class="buttons">

            <button onclick="addition()">Addition (+)</button>

            <button onclick="subtraction()">Subtraction (-)</button>

            <button onclick="multiplication()">Multiply (×)</button>

            <button onclick="division()">Division (÷)</button>

            <button onclick="squareRoot()">Square Root (√x)</button>

            <button onclick="cubeRoot()">Cube Root (∛x)</button>

            <button onclick="power()">Power (xʸ)</button>

            <button onclick="clearFields()">Clear</button>

        </div>

        <h2 id="result">Result :</h2>

    </div>

</div>

<script src="index.js"></script>

</body>
</html>
